name: Sync Only gobloggugel Ads (Full Mirror)

on:
  schedule:
    - cron: "0 0 */4 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone upstream (shallow)
        run: |
          git clone --depth=1 https://github.com/nengmaya538/nengmaya538.github.io.git /tmp/upstream

      - name: Sync folder with delete
        run: |
          rsync -av --delete /tmp/upstream/_includes/ads/gobloggugel/ ./_includes/ads/gobloggugel/

      - name: Commit changes
        run: |
          git add _includes/ads/gobloggugel/
          git commit -m "Full sync gobloggugel ads (mirror)" || echo "No changes"

      - name: Push
        run: |
          git push origin master
